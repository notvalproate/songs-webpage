    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0b0c10;
        --surface: #13141a;
        --surface2: #1c1d26;
        --border: rgba(255, 255, 255, 0.06);
        --text: #e8e9f0;
        --muted: #7a7b8a;
        --accent: #c3f542;
        --spotify: #1db954;
        --youtube: #ff0000;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background-color: var(--bg);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
      }

      /* ── Animated background ── */
      .bg-canvas {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.18;
        animation: drift linear infinite;
      }
      .orb1 {
        width: 700px;
        height: 700px;
        background: #5c3dff;
        top: -200px;
        left: -100px;
        animation-duration: 40s;
      }
      .orb2 {
        width: 500px;
        height: 500px;
        background: #c3f542;
        bottom: 100px;
        right: -150px;
        animation-duration: 55s;
        animation-direction: reverse;
      }
      .orb3 {
        width: 400px;
        height: 400px;
        background: #ff3d9a;
        top: 40%;
        left: 40%;
        animation-duration: 48s;
      }
      .orb4 {
        width: 300px;
        height: 300px;
        background: #1db954;
        bottom: -100px;
        left: 20%;
        animation-duration: 35s;
      }

      @keyframes drift {
        0% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(60px, -40px) scale(1.08);
        }
        66% {
          transform: translate(-40px, 50px) scale(0.94);
        }
        100% {
          transform: translate(0, 0) scale(1);
        }
      }

      /* subtle grid overlay */
      .bg-grid {
        position: fixed;
        inset: 0;
        z-index: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.025) 1px,
            transparent 1px
          );
        background-size: 40px 40px;
        pointer-events: none;
      }

      /* ── Layout ── */
      .wrapper {
        position: relative;
        z-index: 1;
        max-width: 780px;
        margin: 0 auto;
        padding: 64px 24px 80px;
      }

      header {
        margin-bottom: 56px;
        text-align: center;
      }

      .tag {
        display: inline-block;
        font-family: "DM Sans", sans-serif;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
        background: rgba(195, 245, 66, 0.08);
        border: 1px solid rgba(195, 245, 66, 0.2);
        padding: 4px 14px;
        border-radius: 100px;
        margin-bottom: 20px;
      }

      h1 {
        font-family: "Syne", sans-serif;
        font-size: clamp(2.4rem, 6vw, 3.8rem);
        font-weight: 800;
        line-height: 1.1;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, #fff 30%, #a0a2bb 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      header p {
        margin-top: 12px;
        color: var(--muted);
        font-size: 15px;
        font-weight: 300;
      }

      /* ── Song list ── */
      .list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .song-card {
        display: grid;
        grid-template-columns: 56px 1fr auto;
        align-items: center;
        gap: 16px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px 16px 12px 12px;
        transition:
          background 0.2s,
          border-color 0.2s,
          transform 0.2s;
        animation: fadeUp 0.4s ease both;
        position: relative;
      }

      .song-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.025) 0%,
          transparent 60%
        );
        opacity: 0;
        transition: opacity 0.2s;
      }

      .song-card:hover {
        background: var(--surface2);
        border-color: rgba(255, 255, 255, 0.12);
        transform: translateY(-2px);
      }

      .song-card:hover::before {
        opacity: 1;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* stagger */
      .song-card:nth-child(1) {
        animation-delay: 0.04s;
      }
      .song-card:nth-child(2) {
        animation-delay: 0.08s;
      }
      .song-card:nth-child(3) {
        animation-delay: 0.12s;
      }
      .song-card:nth-child(4) {
        animation-delay: 0.16s;
      }
      .song-card:nth-child(5) {
        animation-delay: 0.2s;
      }
      .song-card:nth-child(6) {
        animation-delay: 0.24s;
      }
      .song-card:nth-child(7) {
        animation-delay: 0.28s;
      }
      .song-card:nth-child(8) {
        animation-delay: 0.32s;
      }
      .song-card:nth-child(9) {
        animation-delay: 0.36s;
      }
      .song-card:nth-child(10) {
        animation-delay: 0.4s;
      }
      .song-card:nth-child(11) {
        animation-delay: 0.44s;
      }
      .song-card:nth-child(12) {
        animation-delay: 0.48s;
      }
      .song-card:nth-child(13) {
        animation-delay: 0.52s;
      }
      .song-card:nth-child(14) {
        animation-delay: 0.56s;
      }
      .song-card:nth-child(15) {
        animation-delay: 0.6s;
      }
      .song-card:nth-child(16) {
        animation-delay: 0.64s;
      }
      .song-card:nth-child(17) {
        animation-delay: 0.68s;
      }
      .song-card:nth-child(18) {
        animation-delay: 0.72s;
      }
      .song-card:nth-child(19) {
        animation-delay: 0.76s;
      }
      .song-card:nth-child(20) {
        animation-delay: 0.8s;
      }

      /* ── Album art ── */
      .art-wrap {
        position: relative;
        width: 56px;
        height: 56px;
        flex-shrink: 0;
      }

      .art-wrap img {
        width: 56px;
        height: 56px;
        border-radius: 8px;
        object-fit: cover;
        display: block;
        background: var(--surface2);
      }

      .num {
        position: absolute;
        bottom: -5px;
        right: -7px;
        font-family: "Syne", sans-serif;
        font-size: 10px;
        font-weight: 700;
        color: var(--bg);
        background: var(--accent);
        border-radius: 4px;
        padding: 1px 5px;
        line-height: 1.4;
      }

      /* ── Song info ── */
      .info {
        min-width: 0;
      }

      .title {
        font-family: "Syne", sans-serif;
        font-size: 14.5px;
        font-weight: 700;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .romanized {
        font-family: "DM Sans", sans-serif;
        font-size: 11.5px;
        font-weight: 400;
        color: var(--accent);
        opacity: 0.8;
        margin-top: 1px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .artist {
        font-size: 12.5px;
        color: var(--muted);
        margin-top: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* ── Platform buttons ── */
      .actions {
        display: flex;
        gap: 8px;
        flex-shrink: 0;
      }

      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        border-radius: 8px;
        text-decoration: none;
        cursor: pointer;
        transition:
          transform 0.15s ease,
          background 0.15s ease,
          border-color 0.15s ease,
          box-shadow 0.15s ease;
        flex-shrink: 0;
        position: relative;
        z-index: 2;
      }

      .btn:hover {
        transform: scale(1.18) translateY(-1px);
      }

      .btn-spotify {
        background: rgba(29, 185, 84, 0.12);
        border: 1px solid rgba(29, 185, 84, 0.3);
      }
      .btn-spotify:hover {
        background: rgba(29, 185, 84, 0.35);
        border-color: rgba(29, 185, 84, 0.7);
        box-shadow: 0 0 14px rgba(29, 185, 84, 0.4);
      }

      .btn-youtube {
        background: rgba(255, 0, 0, 0.1);
        border: 1px solid rgba(255, 0, 0, 0.25);
      }
      .btn-youtube:hover {
        background: rgba(255, 0, 0, 0.3);
        border-color: rgba(255, 0, 0, 0.65);
        box-shadow: 0 0 14px rgba(255, 0, 0, 0.35);
      }

      .btn svg {
        width: 16px;
        height: 16px;
      }

      /* ── Footer ── */
      footer {
        text-align: center;
        margin-top: 56px;
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.04em;
      }

      footer span {
        color: var(--accent);
      }
    </style>
  </head>

      async function fetchArt(query) {
        try {
          const url = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&limit=1`;
          const r = await fetch(url);
          const d = await r.json();
          if (d.results && d.results[0]) {
            return d.results[0].artworkUrl100.replace("100x100", "300x300");
          }
        } catch (e) {}
        return null;
      }

      function makeCard(song, idx) {
        const card = document.createElement("div");
        card.className = "song-card";

        const artWrap = document.createElement("div");
        artWrap.className = "art-wrap";

        const img = document.createElement("img");
        img.src =
          'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="56" height="56"><rect width="56" height="56" rx="8" fill="%231c1d26"/></svg>';
        img.alt = song.title;
        img.loading = "lazy";

        // Load iTunes art
        fetchArt(itunesQueries[idx]).then((url) => {
          if (url) {
            const t = new Image();
            t.onload = () => {
              img.src = url;
              if (song.artist === "supercell") {
                img.src = song.art;
              }
            };
            t.src = url;
          }
        });

        if (song.artist === "フランシュシュ (Franchouchou)") {
            img.src = song.art;
        }

        const num = document.createElement("span");
        num.className = "num";
        num.textContent = String(idx + 1).padStart(2, "0");

        artWrap.appendChild(img);
        artWrap.appendChild(num);

        const info = document.createElement("div");
        info.className = "info";

        const title = document.createElement("div");
        title.className = "title";
        title.textContent = song.title;

        info.appendChild(title);

        if (song.romanized) {
          const rom = document.createElement("div");
          rom.className = "romanized";
          rom.textContent = song.romanized;
          info.appendChild(rom);
        }

        const artist = document.createElement("div");
        artist.className = "artist";
        artist.textContent = song.artist;
        info.appendChild(artist);

        const actions = document.createElement("div");
        actions.className = "actions";

        const spotifyBtn = document.createElement("a");
        spotifyBtn.className = "btn btn-spotify";
        spotifyBtn.href = song.spotify;
        spotifyBtn.target = "_blank";
        spotifyBtn.rel = "noopener noreferrer";
        spotifyBtn.title = "Open on Spotify";
        spotifyBtn.innerHTML = '<svg><use href="#icon-spotify"/></svg>';

        const ytBtn = document.createElement("a");
        ytBtn.className = "btn btn-youtube";
        ytBtn.href = song.youtube;
        ytBtn.target = "_blank";
        ytBtn.rel = "noopener noreferrer";
        ytBtn.title = "Search on YouTube";
        ytBtn.innerHTML = '<svg><use href="#icon-youtube"/></svg>';

        actions.appendChild(spotifyBtn);
        actions.appendChild(ytBtn);

        card.appendChild(artWrap);
        card.appendChild(info);
        card.appendChild(actions);

        return card;
      }

      const list = document.getElementById("list");
      songs.forEach((song, i) => {
        list.appendChild(makeCard(song, i));
      });
